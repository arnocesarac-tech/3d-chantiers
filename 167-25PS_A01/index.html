<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D chantier - 167-25PS_A01</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background: #4f5961; color: #17202a; }
    #viewer { width: 100vw; height: 100vh; display: block; }
    .label {
      position: fixed; left: 10px; top: 10px; z-index: 2;
      background: rgba(243,245,246,.94); border: 1px solid #cbd2d7;
      border-radius: 6px; padding: 8px 10px; font-size: 13px;
    }
    .tools {
      position: fixed; right: 10px; top: 10px; z-index: 3;
      display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end;
      max-width: min(520px, calc(100vw - 20px));
    }
    button {
      border: 1px solid #aeb7be; background: rgba(243,245,246,.95);
      color: #17202a; border-radius: 6px; padding: 8px 10px;
      font-size: 13px; cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    .status {
      position: fixed; left: 10px; bottom: 10px; z-index: 2;
      background: rgba(243,245,246,.94); border: 1px solid #cbd2d7;
      border-radius: 6px; padding: 8px 10px; font-size: 13px; max-width: 360px;
    }
    .help {
      position: fixed; left: 10px; bottom: 10px; z-index: 2;
      background: rgba(243,245,246,.94); border: 1px solid #cbd2d7;
      border-radius: 6px; padding: 8px 10px; font-size: 13px;
      line-height: 1.35; max-width: 360px;
    }
    .panel {
      position: fixed; right: 10px; bottom: 10px; z-index: 3;
      background: rgba(243,245,246,.96); border: 1px solid #cbd2d7;
      border-radius: 6px; padding: 10px 12px; font-size: 13px;
      line-height: 1.45; min-width: 220px; max-width: 360px;
      display: none;
    }
    .panel strong { display: block; margin-bottom: 4px; }
    .measure-dot {
      position: fixed; z-index: 4; width: 10px; height: 10px;
      border-radius: 50%; background: #f8d24a; border: 2px solid #1e252b;
      pointer-events: none; transform: translate(-50%, -50%);
    }
    @media (max-width: 700px) {
      .label { top: auto; bottom: 10px; max-width: calc(100vw - 20px); }
      .tools { left: 10px; right: 10px; top: 10px; justify-content: flex-start; }
      .help { display: none; }
      .panel { left: 10px; right: 10px; bottom: 58px; max-width: none; }
    }
  </style>
</head>
<body>
  <div class="label">3D chantier - 167-25PS_A01</div>
  <div class="tools">
    <button id="resetView">Recentrer</button>
    <button id="frontView">Face</button>
    <button id="sideView">Cote</button>
    <button id="topView">Dessus</button>
    <button id="edgesView">Sans aretes</button>
    <button id="materialView">Matieres</button>
    <button id="dimsView">Dimensions</button>
    <button id="measureView">Mesurer</button>
  </div>
  <div id="viewer"></div>
  <div class="status" id="status">Chargement 3D...</div>
  <div class="help" id="help">1 doigt : rotation<br>2 doigts : deplacer / zoomer<br>Molette : zoom</div>
  <div class="panel" id="infoPanel"></div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLLoader } from 'three/addons/loaders/VRMLLoader.js';

    const container = document.getElementById('viewer');
    const status = document.getElementById('status');
    const help = document.getElementById('help');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x5b666f);

    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = true;

    scene.add(new THREE.HemisphereLight(0xffffff, 0x5b6470, 2.0));
    const light = new THREE.DirectionalLight(0xffffff, 2.4);
    light.position.set(200, 300, 150);
    scene.add(light);
    const fillLight = new THREE.DirectionalLight(0xffffff, 0.65);
    fillLight.position.set(-180, 120, -220);
    scene.add(fillLight);

    let currentObject = null;
    let modelBox = null;
    let modelSize = null;
    let modelDistance = 100;
    let edgesGroup = null;
    let edgesVisible = true;
    let neutralMode = true;
    const originalMaterials = new Map();
    let measureMode = false;
    let measurePoints = [];
    let measureDots = [];
    let measureLine = null;
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const infoPanel = document.getElementById('infoPanel');

    function mm(value) {
      return Math.round(value * 1000);
    }

    function fitObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const distance = maxDim * 1.8;
      object.position.sub(center);
      modelBox = new THREE.Box3().setFromObject(object);
      modelSize = modelBox.getSize(new THREE.Vector3());
      modelDistance = distance;
      setView(distance, distance * 0.7, distance);
      updateDimensionsPanel(false);
    }

    function setView(x, y, z) {
      camera.position.set(x, y, z);
      camera.near = Math.max(modelDistance / 1000, 0.1);
      camera.far = modelDistance * 100;
      camera.updateProjectionMatrix();
      controls.target.set(0, 0, 0);
      controls.update();
    }

    function createEdges(object) {
      if (edgesGroup) scene.remove(edgesGroup);
      edgesGroup = new THREE.Group();
      const material = new THREE.LineBasicMaterial({ color: 0x1e252b, transparent: true, opacity: 0.35 });
      object.traverse((child) => {
        if (!child.isMesh || !child.geometry) return;
        const edges = new THREE.EdgesGeometry(child.geometry, 30);
        const lines = new THREE.LineSegments(edges, material);
        child.updateWorldMatrix(true, false);
        lines.applyMatrix4(child.matrixWorld);
        edgesGroup.add(lines);
      });
      edgesGroup.visible = edgesVisible;
      scene.add(edgesGroup);
    }

    function showEdges(show) {
      edgesVisible = show;
      if (edgesGroup) edgesGroup.visible = edgesVisible;
      document.getElementById('edgesView').textContent = edgesVisible ? 'Sans aretes' : 'Aretes';
    }

    function rememberMaterials(object) {
      originalMaterials.clear();
      object.traverse((child) => {
        if (child.isMesh && child.material) originalMaterials.set(child.uuid, child.material);
      });
    }

    function setNeutralMode(active) {
      if (!currentObject) return;
      neutralMode = active;
      currentObject.traverse((child) => {
        if (!child.isMesh) return;
        if (neutralMode) {
          child.material = new THREE.MeshStandardMaterial({
            color: 0xd8d8d2,
            roughness: 0.75,
            metalness: 0.0
          });
        } else {
          const original = originalMaterials.get(child.uuid);
          if (original) child.material = original;
        }
      });
      document.getElementById('materialView').textContent = neutralMode ? 'Matieres' : 'Neutre';
    }

    function updateDimensionsPanel(show) {
      if (!modelSize) return;
      infoPanel.innerHTML =
        '<strong>Dimensions indicatives</strong>' +
        'Largeur X : ' + mm(modelSize.x) + ' mm<br>' +
        'Profondeur Y : ' + mm(modelSize.y) + ' mm<br>' +
        'Hauteur Z : ' + mm(modelSize.z) + ' mm';
      infoPanel.style.display = show ? 'block' : 'none';
    }

    function clearMeasure() {
      measurePoints = [];
      measureDots.forEach((dot) => dot.remove());
      measureDots = [];
      if (measureLine) {
        scene.remove(measureLine);
        measureLine.geometry.dispose();
        measureLine.material.dispose();
        measureLine = null;
      }
    }

    function setMeasureMode(active) {
      measureMode = active;
      controls.enabled = !active;
      document.getElementById('measureView').textContent = active ? 'Stop mesure' : 'Mesurer';
      if (active) {
        clearMeasure();
        infoPanel.innerHTML = '<strong>Mesure indicative</strong>Clique le point 1 puis le point 2.';
        infoPanel.style.display = 'block';
      } else {
        clearMeasure();
        infoPanel.style.display = 'none';
      }
    }

    function addMeasureDot(point) {
      const projected = point.clone().project(camera);
      const x = (projected.x * 0.5 + 0.5) * innerWidth;
      const y = (-projected.y * 0.5 + 0.5) * innerHeight;
      const dot = document.createElement('div');
      dot.className = 'measure-dot';
      dot.style.left = x + 'px';
      dot.style.top = y + 'px';
      document.body.appendChild(dot);
      measureDots.push(dot);
    }

    function snapToNearestVertex(hit) {
      const mesh = hit.object;
      const geometry = mesh.geometry;
      const position = geometry && geometry.attributes && geometry.attributes.position;
      const face = hit.face;
      if (!mesh || !position || !face) return hit.point.clone();

      const matrix = mesh.matrixWorld;
      const candidates = [face.a, face.b, face.c]
        .map((index) => new THREE.Vector3().fromBufferAttribute(position, index).applyMatrix4(matrix));

      let best = candidates[0] || hit.point.clone();
      let bestDistance = best.distanceTo(hit.point);
      for (const point of candidates) {
        const distance = point.distanceTo(hit.point);
        if (distance < bestDistance) {
          best = point;
          bestDistance = distance;
        }
      }
      return best.clone();
    }

    function drawMeasureLine() {
      if (measureLine) scene.remove(measureLine);
      const geometry = new THREE.BufferGeometry().setFromPoints(measurePoints);
      const material = new THREE.LineBasicMaterial({ color: 0xf8d24a, linewidth: 2 });
      measureLine = new THREE.Line(geometry, material);
      scene.add(measureLine);
    }

    renderer.domElement.addEventListener('click', (event) => {
      if (!measureMode || !currentObject) return;
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObject(currentObject, true);
      if (!hits.length) return;

      if (measurePoints.length >= 2) clearMeasure();
      const snapPoint = snapToNearestVertex(hits[0]);
      measurePoints.push(snapPoint);
      addMeasureDot(snapPoint);

      if (measurePoints.length === 1) {
        infoPanel.innerHTML = '<strong>Mesure indicative</strong>Point 1 pris. Clique le point 2.';
        infoPanel.style.display = 'block';
      }

      if (measurePoints.length === 2) {
        drawMeasureLine();
        const d = measurePoints[0].distanceTo(measurePoints[1]);
        infoPanel.innerHTML =
          '<strong>Mesure indicative</strong>' +
          Math.round(d * 1000) + ' mm<br>' +
          '<small>Clique deux nouveaux points pour recommencer.</small>';
        infoPanel.style.display = 'block';
      }
    });

    document.getElementById('resetView').addEventListener('click', () => setView(modelDistance, modelDistance * 0.7, modelDistance));
    document.getElementById('frontView').addEventListener('click', () => setView(0, modelDistance * 0.15, modelDistance));
    document.getElementById('sideView').addEventListener('click', () => setView(modelDistance, modelDistance * 0.15, 0));
    document.getElementById('topView').addEventListener('click', () => setView(0, modelDistance, 0.01));
    document.getElementById('edgesView').addEventListener('click', () => showEdges(!edgesVisible));
    document.getElementById('materialView').addEventListener('click', () => setNeutralMode(!neutralMode));
    document.getElementById('dimsView').addEventListener('click', () => {
      const visible = infoPanel.style.display !== 'block';
      setMeasureMode(false);
      updateDimensionsPanel(visible);
    });
    document.getElementById('measureView').addEventListener('click', () => setMeasureMode(!measureMode));

    const loader = new VRMLLoader();
    loader.load('modele.wrl', (object) => {
      currentObject = object;
      scene.add(object);
      rememberMaterials(object);
      fitObject(object);
      createEdges(object);
      setNeutralMode(true);
      status.style.display = 'none';
      setTimeout(() => { help.style.display = 'none'; }, 7000);
    }, undefined, (error) => {
      status.textContent = 'Erreur chargement 3D';
      console.error(error);
    });

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
